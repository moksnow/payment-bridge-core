spring:
  application:
    name: payment-bridge-core

  datasource:
    url: jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: change-me-in-production-must-be-at-least-64-characters-long!!
    expiration-ms: 3600000

  rails:
    stripe:
      api-key: ${STRIPE_API_KEY:sk_test_your_key_here}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

  fx:
    #mock
    #exchangeratesapi
    provider: mock
    api-key: ${FX_API_KEY:}
    base-url: http://api.exchangeratesapi.io/v1

logging:
  level:
    com.paymentbridge: DEBUG
    org.hibernate.SQL: DEBUG
